<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 光谱渐变 - 从红到紫 -->
    <linearGradient id="spectrumGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4D4F"/>
      <stop offset="20%" style="stop-color:#FF7A45"/>
      <stop offset="40%" style="stop-color:#FFC53D"/>
      <stop offset="60%" style="stop-color:#52C41A"/>
      <stop offset="80%" style="stop-color:#1890FF"/>
      <stop offset="100%" style="stop-color:#722ED1"/>
    </linearGradient>

    <!-- 三棱镜渐变 -->
    <linearGradient id="prismGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F5FF"/>
      <stop offset="50%" style="stop-color:#D6E4FF"/>
      <stop offset="100%" style="stop-color:#ADC6FF"/>
    </linearGradient>

    <!-- 光线发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="#0D1117" stroke="url(#spectrumGradient)" stroke-width="2"/>

  <!-- 三棱镜 -->
  <polygon points="100,35 145,130 55,130" fill="url(#prismGradient)" stroke="#ADC6FF" stroke-width="1.5" opacity="0.9"/>

  <!-- 入射光线（白色） -->
  <line x1="20" y1="75" x2="80" y2="85" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 折射光谱线（从三棱镜出射） -->
  <!-- 红色 -->
  <line x1="120" y1="75" x2="175" y2="55" stroke="#FF4D4F" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 橙色 -->
  <line x1="125" y1="82" x2="178" y2="70" stroke="#FF7A45" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 黄色 -->
  <line x1="128" y1="89" x2="180" y2="85" stroke="#FFC53D" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 绿色 -->
  <line x1="130" y1="96" x2="180" y2="100" stroke="#52C41A" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 蓝色 -->
  <line x1="128" y1="103" x2="178" y2="115" stroke="#1890FF" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- 紫色 -->
  <line x1="125" y1="110" x2="175" y2="130" stroke="#722ED1" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- SQL 文字 -->
  <text x="100" y="165" text-anchor="middle" font-family="SF Mono, Monaco, Consolas, monospace" font-size="22" font-weight="bold" fill="url(#spectrumGradient)">SQL</text>

  <!-- 光谱 Spectrum 小字 -->
  <text x="100" y="182" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E" letter-spacing="3">SPECTRUM</text>
</svg>
